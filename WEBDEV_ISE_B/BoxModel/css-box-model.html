<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        .box{
            width: 200px;
            height: 100px;
            background-color: lightblue;/*Content area of the box*/
            border: 2px solid black;/*Border of the box*/;
            color:brown/*Content*/;
            padding: 40px/*Padding*/;
            border: 5px solid blue/*Border*/;
            margin: 10px/*Margin of the box*/;
        }
    </style>
</head>
<body>
    <h2>BOX Model Demo</h2>
    <div class ="box">Tejas</div>
    
</body>
</html>
