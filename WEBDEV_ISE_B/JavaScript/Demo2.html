<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Object Model | Manipulations using JS</title>
</head>
<body>
    <p id="demo">This is the Original text.</p>
    <button onclick="changeText()">Click Me</button>
    <!-- Example of buttom event / EVENTS in JS-->
     <button id="btn">Hover Over Me</button>
    <script>
        function changeText() {
            document.getElementById("demo").innerText = "Text changed"
            document.getElementById("demo").style.color = "blue"
        }
        document.getElementById("btn").onmouseover = function () {
            alert("You Hovered over the button")
        }
    </script>
</body>
</html>
