<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation in JavaScript</title>
</head>
<body>
    <form action="" onsubmit="return validateForm();">
        <input type="text" id="username" placeholder="Enter Name" > <br><br>
        <input type="email" id="email" placeholder="Enter Email"> <br><br>
        <button type="submit">Submit</button>
    </form>

    <script>
        function validateForm() {
            // We are storing the user's input into two variables
            let name = document.getElementById("username").value;
            let email = document.getElementById("email").value;

            // Now we will compare these inputs with empty strings
            // If no data has been passed, we will give a alert
            // Otherwise we will return & form works normally

            if(name === "" ||email === "" ) {
                alert("All the fields are mandatory");
                return false; // Don't allow the form tombe submitted
            }
            return true; // Let the submission happen normally
        }
    </script>
</body>
</html>
