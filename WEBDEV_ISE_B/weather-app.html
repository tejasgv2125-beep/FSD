<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App Using OpenWeatherMap API</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4 text-center " style="width:320px;">
        <h4 class="mb-3">⛅Weather App</h4>
        <div class="input-group mb-3">
            <input type="text" id="city" class="form-control" placeholder="Enter city name">
            <button onclick="getWeather()" class="btn btn-primary" >SEARCH</button>
    </div>
    <h5 id="result" class="mb-5">--</h5>
    <small id="time" class="text-muted"></small>
    </div>
    <script>
        let apiKey="fc4853621275730b901dbbafe0c0be26";
        async function getWeather(){
            let city = document.getElementById("city").value;
            if(city === "") {
                alert("Please enter a city name");
                return;
            }
            let url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;
            try {
                let res = await fetch(url);
                let data=await res.json();//{Key value pair}
                if(data.cod != 200){
                    document.getElementById("result").innerText = "City not found";
                    document.getElementById("time").innerText = "";
                    return;
                }

                let condition=data.weather[0].main;

                else if(condition === "rain") icon="🌧️";
                else if(condition === "snow") icon="❄️";
                else if(condition === "thunderstorm") icon="⛈️";
                else if(condition === "drizzle") icon="🌦️";
                else if(condition === "mist" || condition === "fog") icon="🌫️";

                document.getElementById("result").innerHTML = icon+" "+data.name
                ": "+data.main.temp+"°C";
            }catch(e){
                document.getElementById("result").innerText = "Error fetching data";
                document.getElementById("time").innerText = "";
            }
        }
        //⏱️
        function updateTime(){
            let now = new Date();
            let options={timeZone:"Asia/Kolkata",weekday:"long",day:"numeric",month:"long",hour:"2-digit",minute:"2-digit",second:"2-digit"};
            document.getElementById("time").innerText = now.toLocaleString("en-IN",options);
        }
        setInterval(updateTime,1000);
        updateTime();
    </script>
</body>
</html>
